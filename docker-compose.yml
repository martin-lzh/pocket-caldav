services:
  caldav:
    build: .
    container_name: caldav-subscription-server
    restart: unless-stopped
    environment:
      DATA_DIR: /data
      HOST: 0.0.0.0
      PORT: 5232
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:?Set PUBLIC_BASE_URL in .env}
      CALDAV_API_KEY: ${CALDAV_API_KEY:-}
      CALDAV_USERS: ${CALDAV_USERS:-}
      ATTACHMENT_TTL_DAYS: ${ATTACHMENT_TTL_DAYS:-365}
      CLEANUP_INTERVAL_SECONDS: ${CLEANUP_INTERVAL_SECONDS:-3600}
    ports:
      - "${HOST_BIND:-127.0.0.1}:${HOST_PORT:-5232}:5232"
    volumes:
      - caldav-data:/data

volumes:
  caldav-data:
